<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3e2715"/>
      <stop offset="55%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="card" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fffefb"/>
      <stop offset="100%" stop-color="#f7f3ec"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Back card (purple, tilted left) -->
  <g transform="translate(166 210) rotate(-22)" opacity="0.92">
    <rect x="-58" y="-86" width="116" height="160" rx="14" fill="url(#card)" stroke="rgba(28,18,9,0.18)" stroke-width="2"/>
    <path d="M 0 -32 L 12 -8 L 38 -4 L 19 14 L 23 40 L 0 28 L -23 40 L -19 14 L -38 -4 L -12 -8 Z"
          fill="#6d28d9"/>
  </g>
  <!-- Front card (gold/jade taiji, centered) -->
  <g transform="translate(256 276) rotate(-4)">
    <rect x="-86" y="-128" width="172" height="240" rx="20" fill="url(#card)" stroke="rgba(28,18,9,0.18)" stroke-width="2.5"/>
    <circle cx="0" cy="-8" r="46" fill="none" stroke="#b45309" stroke-width="7"/>
    <path d="M -46 -8 A 23 23 0 0 1 0 -8 A 23 23 0 0 0 46 -8 A 46 46 0 0 1 -46 -8 Z" fill="#b45309"/>
    <circle cx="-23" cy="-8" r="6" fill="#fffefb"/>
    <circle cx="23" cy="-8" r="6" fill="#3e2715"/>
  </g>
  <!-- Front card right (orange, tilted right) -->
  <g transform="translate(346 210) rotate(22)" opacity="0.92">
    <rect x="-58" y="-86" width="116" height="160" rx="14" fill="url(#card)" stroke="rgba(28,18,9,0.18)" stroke-width="2"/>
    <circle cx="0" cy="-6" r="34" fill="#c2410c"/>
    <path d="M -16 -6 Q 0 -22 16 -6 Q 0 10 -16 -6 Z" fill="#fffefb"/>
  </g>
