<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e1047"/>
      <stop offset="50%" stop-color="#11031c"/>
      <stop offset="100%" stop-color="#090115"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe29a" />
      <stop offset="50%" stop-color="#d98a0a" />
      <stop offset="100%" stop-color="#8b5a00" />
    </linearGradient>
    <linearGradient id="cosmicBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="40%" stop-color="#7c3aed" />
      <stop offset="70%" stop-color="#0d9668" />
      <stop offset="100%" stop-color="#ea6a17" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <style>
      .svg-ring-outer {
        animation: spin-cw 30s linear infinite;
        transform-origin: 50px 50px;
      }
      .svg-ring-inner {
        animation: spin-ccw 25s linear infinite;
        transform-origin: 50px 50px;
      }
      .svg-star-n, .svg-star-s {
        animation: twinkle 3s ease-in-out infinite;
        transform-origin: 50px 50px;
      }
      .svg-star-w, .svg-star-e {
        animation: twinkle-delayed 3s ease-in-out infinite;
        transform-origin: 50px 50px;
      }
      .svg-card-tarot {
        animation: tarot-sway 4s ease-in-out infinite alternate;
        transform-origin: 42px 50px;
      }
      .svg-card-drinking {
        animation: drinking-sway 4.5s ease-in-out infinite alternate;
        transform-origin: 58px 50px;
      }
      .svg-card-center {
        animation: center-float 3.5s ease-in-out infinite alternate;
        transform-origin: 50px 48px;
      }
      .svg-yinyang {
        animation: yinyang-spin 8s linear infinite;
        transform-origin: 0px 0px;
      }
      .svg-stardust circle {
        animation: glow-pulse 3s ease-in-out infinite alternate;
      }

      @keyframes spin-cw {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes spin-ccw {
        from { transform: rotate(360deg); }
        to { transform: rotate(0deg); }
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0.4; transform: scale(0.85); }
        50% { opacity: 1; transform: scale(1.15); }
      }
      @keyframes twinkle-delayed {
        0%, 100% { opacity: 1; transform: scale(1.15); }
        50% { opacity: 0.4; transform: scale(0.85); }
      }
      @keyframes tarot-sway {
        0% { transform: translate(42px, 50px) rotate(-20deg); }
        100% { transform: translate(42px, 50px) rotate(-14deg); }
      }
      @keyframes drinking-sway {
        0% { transform: translate(58px, 50px) rotate(14deg); }
        100% { transform: translate(58px, 50px) rotate(20deg); }
      }
      @keyframes center-float {
        0% { transform: translate(50px, 50px) rotate(-3deg); }
        100% { transform: translate(50px, 46px) rotate(1deg); }
      }
      @keyframes yinyang-spin {
        0% { transform: translate(0, -2px) rotate(0deg); }
        100% { transform: translate(0, -2px) rotate(360deg); }
      }
      @keyframes glow-pulse {
        0% { opacity: 0.4; }
        100% { opacity: 1; }
      }
    </style>
  </defs>
  
  <rect width="512" height="512" rx="112" fill="url(#bg)" stroke="url(#goldGrad)" stroke-width="4"/>
  
  <!-- Scaled content from 100x100 to 512x512 -->
  <g transform="scale(5.12)">
     <!-- Outer Astrolabe Ring -->
     <circle cx="50" cy="50" r="44" stroke="url(#goldGrad)" stroke-width="1.8" stroke-dasharray="1 3.5" class="svg-ring-outer" />
     <circle cx="50" cy="50" r="40" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.5" />
     <circle cx="50" cy="50" r="37" stroke="url(#goldGrad)" stroke-width="1.5" class="svg-ring-inner" />
     
     <!-- 4 Star Points -->
     <path d="M 50 6 L 52 10 L 50 14 L 48 10 Z" fill="url(#goldGrad)" class="svg-star-n"/>
     <path d="M 50 94 L 52 90 L 50 86 L 48 90 Z" fill="url(#goldGrad)" class="svg-star-s"/>
     <path d="M 6 50 L 10 52 L 14 50 L 10 48 Z" fill="url(#goldGrad)" class="svg-star-w"/>
     <path d="M 94 50 L 90 52 L 86 50 L 90 48 Z" fill="url(#goldGrad)" class="svg-star-e"/>

     <!-- The Layered Magical Cards -->
     <!-- Back card left (Purple Tarot) -->
     <g class="svg-card-tarot">
       <rect x="-14" y="-21" width="28" height="42" rx="5" fill="#fdfaff" stroke="#7c3aed" stroke-width="1.5" />
       <path d="M -9 -8 L -7 -6 L -5 -8 L -7 -10 Z" fill="#7c3aed" transform="translate(0, 14)"/>
     </g>
     
     <!-- Back card right (Orange Drinking) -->
     <g class="svg-card-drinking">
       <rect x="-14" y="-21" width="28" height="42" rx="5" fill="#fffaf5" stroke="#ea6a17" stroke-width="1.5" />
       <circle cx="5" cy="-2" r="3" fill="#ea6a17"/>
     </g>

     <!-- Center main card -->
     <g class="svg-card-center">
       <rect x="-16" y="-24" width="32" height="48" rx="6" fill="url(#cosmicBg)" stroke="url(#goldGrad)" stroke-width="2" filter="drop-shadow(0 4px 12px rgba(26, 10, 0, 0.25))"/>
       <rect x="-13" y="-21" width="26" height="42" rx="4" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.8" stroke-dasharray="3 1.5"/>
       
       <!-- Yin-Yang + Astrological Star Combo in Center -->
       <g class="svg-yinyang" transform="translate(0, -2)">
         <circle cx="0" cy="0" r="7" fill="#ffffff" stroke="url(#goldGrad)" stroke-width="1"/>
         <path d="M 0 -7 A 3.5 3.5 0 0 1 0 0 A 3.5 3.5 0 0 0 0 7 A 7 7 0 0 1 0 -7 Z" fill="#d98a0a"/>
         <circle cx="0" cy="-3.5" r="1" fill="#d98a0a"/>
         <circle cx="0" cy="3.5" r="1" fill="#ffffff"/>
       </g>
       
       <!-- Stars (Tử Vi) -->
       <path d="M -8 -13 L -6 -11 L -4 -13 L -6 -15 Z" fill="#ffe29a"/>
       <!-- Numbers / Hash (Thần Số Học) -->
       <path d="M 8 9 L 10 11 L 12 9 L 10 7 Z" fill="#ffe29a"/>
       <line x1="-10" y1="9" x2="-2" y2="9" stroke="#ffe29a" stroke-width="0.8" opacity="0.6"/>
       <line x1="-10" y1="12" x2="-4" y2="12" stroke="#ffe29a" stroke-width="0.8" opacity="0.6"/>
     </g>
     
     <!-- Orbiting stardust -->
     <g filter="url(#neonGlow)" class="svg-stardust">
       <circle cx="20" cy="28" r="1.5" fill="#ffe29a" style="animation-delay: 0s;"/>
       <circle cx="80" cy="28" r="1.5" fill="#ffe29a" style="animation-delay: 1s;"/>
       <circle cx="22" cy="72" r="1.5" fill="#ffe29a" style="animation-delay: 2s;"/>
       <circle cx="78" cy="72" r="1.5" fill="#ffe29a" style="animation-delay: 3s;"/>
     </g>
  </g>
</svg>
