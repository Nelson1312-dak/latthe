<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta property="og:site_name" content="latbai.vn">
  <link rel="icon" type="image/svg+xml" href="/images/icon.svg">
  <link rel="apple-touch-icon" href="/images/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/dua/css/dua.css">
</head>
<body>

  <canvas id="confetti-canvas"></canvas>

  <header class="site-header">
    <a href="/" class="logo-link">
      <img src="/images/icon.svg" alt="latbai.vn">
      latbai.vn
    </a>
  </header>

  <div class="page-wrap">

    <!-- ── SETUP ─────────────────────────────────────────────── -->
    <section id="setup-phase">
      <h1 class="module-title">🏆 Đua Thú</h1>
      <p class="module-sub">Chọn 2–6 con · Đặt tên · Xem ai thắng</p>

      <p id="sel-count">Chọn ít nhất 2 con</p>
      <div id="animal-grid"></div>
      <div id="name-inputs"></div>

      <button id="start-btn" disabled>🏁 Bắt đầu đua!</button>
    </section>

    <!-- ── RACE ──────────────────────────────────────────────── -->
    <section id="race-phase" class="hidden">
      <p class="race-title">🏟️ Đường đua</p>
      <div id="track"></div>
    </section>

    <!-- ── RESULT ────────────────────────────────────────────── -->
    <section id="result-phase" class="hidden">
      <div id="result-main"></div>
      <div class="result-actions">
        <button class="btn-secondary" id="share-btn">📤 Chia sẻ kết quả</button>
        <button class="btn-primary"   id="race-again-btn">🔄 Đua lại</button>
      </div>
    </section>

  </div>

  <footer class="footer">
    <p>&copy; 2026 <a href="/">latbai.vn</a></p>
  </footer>

  <div id="countdown"></div>

  <nav class="floating-dock">
    <a href="/"         class="dock-item" title="Trang chủ"><i class="ti ti-home"></i><span class="dock-label">Trang chủ</span></a>

  <script src="/dua/js/app.js" defer></script>
