<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đua Thú 🏆 — Đua Ngựa & Đua Vịt Online | latbai.vn</title>
  <meta name="description" content="Đua ngựa trên đường đua hoặc đua vịt dưới hồ bơi. Thêm tên bạn bè không giới hạn, chọn thời lượng, xem ai về đích đầu tiên! Mini game vui cho nhóm bạn.">
  <link rel="canonical" href="https://latbai.vn/dua/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Đua Thú 🏆 — Đua Ngựa & Đua Vịt Online">
  <meta property="og:description" content="Đua ngựa hoặc đua vịt, thêm tên bạn bè không giới hạn, xem ai về đích! Mini game vui miễn phí tại latbai.vn.">
  <meta property="og:url" content="https://latbai.vn/dua/">
  <meta property="og:image" content="https://latbai.vn/images/og-default.png">
  <meta property="og:site_name" content="latbai.vn">
  <link rel="icon" type="image/svg+xml" href="/images/icon.svg">
  <link rel="apple-touch-icon" href="/images/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dua/css/dua.css">
</head>
<body>

  <canvas id="confetti-canvas"></canvas>

  <header class="site-header">
    <a href="/" class="logo-link">
      <img src="/images/icon.svg" alt="latbai.vn">
      latbai.vn
    </a>
  </header>

  <div class="page-wrap">

    <!-- ── SETUP ─────────────────────────────────────────────── -->
    <section id="setup-phase">
      <h1 class="module-title">🏁 Đua Thú</h1>
      <p class="module-sub">Chọn loại đua · Thêm người chơi · Xem ai thắng</p>

      <div class="mode-row">
        <button class="mode-btn" data-mode="horse">
          <span class="mode-emoji">🐴</span>
          <span class="mode-name">Đua Ngựa</span>
          <span class="mode-desc">Phi trên đường đua</span>
        </button>
        <button class="mode-btn" data-mode="duck">
          <span class="mode-emoji">🦆</span>
          <span class="mode-name">Đua Vịt</span>
          <span class="mode-desc">Bơi trên hồ bơi</span>
        </button>
      </div>

      <div id="racer-config" class="hidden">
        <div class="config-head">
          <span id="racer-count-label">2 người chơi</span>
          <button id="add-racer" class="add-btn">+ Thêm</button>
        </div>
        <div id="name-inputs"></div>

        <div class="dur-row">
          <span class="dur-label">⏱️ Thời lượng đua</span>
          <div class="dur-opts">
            <button class="dur-btn" data-sec="5">5s</button>
            <button class="dur-btn chosen" data-sec="10">10s</button>
            <button class="dur-btn" data-sec="20">20s</button>
            <button class="dur-btn" data-sec="30">30s</button>
          </div>
        </div>

        <button id="start-btn">🏁 Bắt đầu đua!</button>
      </div>
    </section>

    <!-- ── RACE ──────────────────────────────────────────────── -->
    <section id="race-phase" class="hidden">
      <div class="race-hud">
        <div class="race-status"><span class="live-dot"></span> ĐANG ĐUA</div>
        <div class="race-timer" id="race-timer">0.00s</div>
      </div>
      <p class="race-title" id="race-title">🏇 Đường Đua</p>
      <div id="commentary" class="commentary"></div>
      <div id="track"></div>
    </section>

    <!-- ── RESULT ────────────────────────────────────────────── -->
    <section id="result-phase" class="hidden">
      <div id="result-main"></div>
      <div class="result-actions">
        <button class="btn-secondary" id="share-btn">📤 Chia sẻ kết quả</button>
        <button class="btn-primary"   id="race-again-btn">🔄 Đua lại</button>
      </div>
    </section>

  </div>

  <footer class="footer">
    <p>&copy; 2026 <a href="/">latbai.vn</a></p>
  </footer>

  <div id="countdown"><span class="cd-text"></span></div>
  <div id="photo-finish">📸 SÁT NÚT!</div>

  <script defer src="/_vercel/insights/script.js"></script>
  <script src="/dua/js/app.js" defer></script>

</body>
</html>
