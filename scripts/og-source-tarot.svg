<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#1a0f3d"/>
      <stop offset="100%" stop-color="#05021a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#c084fc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#2d1b5e"/>
      <stop offset="100%" stop-color="#180b3e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="900" cy="315" rx="420" ry="340" fill="url(#glow)"/>

  <!-- Stars -->
  <g fill="#d4a642" opacity="0.7">
    <circle cx="120" cy="120" r="2"/><circle cx="200" cy="80" r="1.5"/>
    <circle cx="60"  cy="250" r="1.5"/><circle cx="180" cy="500" r="2"/>
    <circle cx="280" cy="540" r="1.5"/><circle cx="1100" cy="80" r="2"/>
    <circle cx="1140" cy="540" r="1.5"/>
  </g>

  <text x="80" y="160" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="20" font-weight="700" fill="#d4a642" letter-spacing="4">MAJOR ARCANA · TIẾNG VIỆT</text>

  <text x="80" y="270" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="88" font-weight="900" fill="#f0eeff" letter-spacing="-2">Bói Tarot</text>
  <text x="80" y="340" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="40" font-weight="700" fill="#c084fc">Trải bài · Luận giải trị liệu</text>

  <line x1="80" y1="380" x2="180" y2="380" stroke="#c084fc" stroke-width="3"/>

  <text x="80" y="430" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="24" font-weight="500" fill="rgba(240,238,255,0.8)">78 lá bài · Quá khứ · Hiện tại · Tương lai</text>
  <text x="80" y="465" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="24" font-weight="500" fill="rgba(240,238,255,0.8)">Rải bài 1–5 lá · Chuyên gia tâm lý AI</text>

  <text x="80" y="560" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="20" font-weight="500" fill="rgba(240,238,255,0.5)">latthe-hazel.vercel.app/tarot · miễn phí</text>

  <!-- Right: 3 tarot cards fanned -->
  <g transform="translate(920 320)">
    <g transform="rotate(-22) translate(-150 0)">
      <rect x="-95" y="-140" width="190" height="280" rx="14" fill="url(#card)" stroke="#d4a642" stroke-width="2.5" opacity="0.9"/>
      <circle cx="0" cy="0" r="60" fill="none" stroke="#d4a642" stroke-width="2" opacity="0.5"/>
      <path d="M 0 -42 L 12 -10 L 46 -6 L 22 16 L 30 50 L 0 32 L -30 50 L -22 16 L -46 -6 L -12 -10 Z" fill="#d4a642" opacity="0.85"/>
    </g>
    <g>
      <rect x="-95" y="-150" width="190" height="300" rx="14" fill="url(#card)" stroke="#d4a642" stroke-width="3"/>
      <circle cx="0" cy="0" r="65" fill="none" stroke="#d4a642" stroke-width="3"/>
      <circle cx="0" cy="0" r="42" fill="none" stroke="#c084fc" stroke-width="2"/>
      <path d="M 0 -48 L 14 -12 L 52 -8 L 24 18 L 32 56 L 0 36 L -32 56 L -24 18 L -52 -8 L -14 -12 Z" fill="#d4a642"/>
      <circle cx="0" cy="0" r="6" fill="#fff"/>
    </g>
    <g transform="rotate(22) translate(150 0)">
      <rect x="-95" y="-140" width="190" height="280" rx="14" fill="url(#card)" stroke="#d4a642" stroke-width="2.5" opacity="0.9"/>
      <circle cx="0" cy="0" r="60" fill="none" stroke="#d4a642" stroke-width="2" opacity="0.5"/>
      <path d="M 0 -42 L 12 -10 L 46 -6 L 22 16 L 30 50 L 0 32 L -30 50 L -22 16 L -46 -6 L -12 -10 Z" fill="#c084fc" opacity="0.85"/>
    </g>
  </g>
</svg>
