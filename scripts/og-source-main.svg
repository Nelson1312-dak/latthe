<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#fffefb"/>
      <stop offset="100%" stop-color="#f0e9dd"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#3e2715"/>
      <stop offset="50%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="card" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fffefb"/>
      <stop offset="100%" stop-color="#f7f3ec"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#b45309" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#b45309" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="900" cy="200" rx="400" ry="280" fill="url(#glow)"/>

  <!-- Left text block -->
  <text x="80" y="220" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="92" font-weight="900" fill="url(#brand)" letter-spacing="-2">lật thẻ</text>
  <text x="80" y="276" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="22" font-weight="600" fill="#1c1209" letter-spacing="3" text-transform="uppercase">LẬT · KHÁM PHÁ · THÁCH THỨC</text>

  <line x1="80" y1="320" x2="180" y2="320" stroke="#b45309" stroke-width="3"/>

  <text x="80" y="380" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="32" font-weight="700" fill="#047857">☯ Gieo Quẻ Kinh Dịch</text>
  <text x="80" y="430" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="32" font-weight="700" fill="#c2410c">🍻 Drinking Games</text>
  <text x="80" y="480" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="32" font-weight="700" fill="#6d28d9">🔮 Bói Bài Tarot</text>

  <text x="80" y="560" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="20" font-weight="500" fill="#1c1209" opacity="0.55">Miễn phí · Không quảng cáo · latthe-hazel.vercel.app</text>

  <!-- Right: 3 cards fanned -->
  <g transform="translate(850 350)">
    <g transform="rotate(-18) translate(-160 0)">
      <rect x="-90" y="-130" width="180" height="260" rx="18" fill="url(#card)" stroke="rgba(28,18,9,0.18)" stroke-width="3"/>
      <circle cx="0" cy="0" r="42" fill="none" stroke="#047857" stroke-width="6"/>
      <path d="M -42 0 A 21 21 0 0 1 0 0 A 21 21 0 0 0 42 0 A 42 42 0 0 1 -42 0 Z" fill="#047857"/>
      <circle cx="-21" cy="0" r="6" fill="#fffefb"/>
      <circle cx="21" cy="0" r="6" fill="#3e2715"/>
    </g>
    <g transform="translate(0 -20)">
      <rect x="-90" y="-140" width="180" height="280" rx="18" fill="url(#card)" stroke="rgba(28,18,9,0.18)" stroke-width="3"/>
      <circle cx="0" cy="-12" r="46" fill="#c2410c"/>
      <path d="M -22 -12 Q 0 -36 22 -12 Q 0 12 -22 -12 Z" fill="#fffefb"/>
      <text x="0" y="56" text-anchor="middle" font-family="serif" font-size="22" font-weight="700" fill="#c2410c">CHEERS</text>
    </g>
    <g transform="rotate(18) translate(160 0)">
      <rect x="-90" y="-130" width="180" height="260" rx="18" fill="url(#card)" stroke="rgba(28,18,9,0.18)" stroke-width="3"/>
      <path d="M 0 -50 L 12 -16 L 48 -10 L 22 14 L 28 50 L 0 32 L -28 50 L -22 14 L -48 -10 L -12 -16 Z" fill="#6d28d9"/>
    </g>
  </g>
</svg>
