<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#fffefb"/>
      <stop offset="100%" stop-color="#ede2cf"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#b91c1c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#b91c1c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tube" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#8a4a2a"/>
      <stop offset="100%" stop-color="#53270f"/>
    </linearGradient>
    <linearGradient id="stick" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#e8c98a"/>
      <stop offset="100%" stop-color="#c9a05a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="900" cy="315" rx="380" ry="320" fill="url(#glow)"/>

  <text x="80" y="160" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="20" font-weight="700" fill="#b91c1c" letter-spacing="4">NGHI THỨC ĐỀN CHÙA · CỔ TRUYỀN</text>

  <text x="80" y="270" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="88" font-weight="900" fill="#2d1e15" letter-spacing="-2">Xin Xăm</text>
  <text x="80" y="340" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="40" font-weight="700" fill="#b91c1c">Thầy Xăm AI giải quẻ cho bạn</text>

  <line x1="80" y1="380" x2="180" y2="380" stroke="#b91c1c" stroke-width="3"/>

  <text x="80" y="430" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="24" font-weight="500" fill="#4a3525">100 quẻ xăm cổ truyền · Lắc ống rút quẻ</text>
  <text x="80" y="465" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="24" font-weight="500" fill="#4a3525">Điển cố xưa · Gia đạo · Tài lộc · Tình duyên</text>

  <text x="80" y="560" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="20" font-weight="500" fill="#1c1209" opacity="0.5">latbai.vn/xin-xam · miễn phí</text>

  <!-- Right: ống xăm với các que -->
  <g transform="translate(830 170)">
    <!-- que xăm trồi lên -->
    <rect x="28"  y="-40" width="18" height="120" rx="8" fill="url(#stick)" stroke="#78461460" stroke-width="1.5"/>
    <rect x="58"  y="-16" width="18" height="96"  rx="8" fill="url(#stick)" stroke="#78461460" stroke-width="1.5"/>
    <rect x="88"  y="-52" width="18" height="132" rx="8" fill="#f5ab2e" stroke="#b4530980" stroke-width="1.5" transform="rotate(8 97 14)"/>
    <rect x="118" y="-24" width="18" height="104" rx="8" fill="url(#stick)" stroke="#78461460" stroke-width="1.5"/>
    <rect x="148" y="-44" width="18" height="124" rx="8" fill="url(#stick)" stroke="#78461460" stroke-width="1.5"/>
    <!-- thân ống -->
    <rect x="0" y="70" width="196" height="290" rx="26" fill="url(#tube)" stroke="#d98a0a" stroke-width="5"/>
    <rect x="14" y="84" width="168" height="262" rx="18" fill="none" stroke="#d98a0a" stroke-width="2" opacity="0.5"/>
    <text x="98" y="245" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="56" font-weight="900" fill="#f5dca0" text-anchor="middle">求籤</text>
  </g>
</svg>
