<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="cardT" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
    <linearGradient id="cardD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#ff8800"/>
    </linearGradient>
    <linearGradient id="cardN" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff66ff"/>
      <stop offset="100%" stop-color="#cc44cc"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#00d4ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="900" cy="315" rx="420" ry="340" fill="url(#glow1)"/>

  <text x="80" y="160" font-family="'Outfit', system-ui, sans-serif" font-size="20" font-weight="800" fill="#00d4ff" letter-spacing="4">1–12 NGƯỜI · NHÓM BẠN</text>

  <text x="80" y="280" font-family="'Outfit', system-ui, sans-serif" font-size="96" font-weight="900" fill="#fff" letter-spacing="-2">Drinking</text>
  <text x="80" y="370" font-family="'Outfit', system-ui, sans-serif" font-size="96" font-weight="900" fill="url(#cardD)" letter-spacing="-2">Games</text>

  <line x1="80" y1="410" x2="180" y2="410" stroke="#ff4444" stroke-width="3"/>

  <text x="80" y="460" font-family="'Inter', system-ui, sans-serif" font-size="24" font-weight="500" fill="rgba(255,255,255,0.85)">Sự Thật · Thử Thách · Bình Chọn · Chưa Từng</text>
  <text x="80" y="495" font-family="'Inter', system-ui, sans-serif" font-size="24" font-weight="500" fill="rgba(255,255,255,0.85)">Quẩy cực nhiệt với hội bạn 🔥</text>

  <text x="80" y="580" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="500" fill="rgba(255,255,255,0.5)">latthe-hazel.vercel.app/drinking · miễn phí</text>

  <!-- Right: 3 stacked game cards -->
  <g transform="translate(920 320)">
    <g transform="rotate(-18) translate(-140 -10)">
      <rect x="-100" y="-145" width="200" height="290" rx="20" fill="url(#cardT)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
      <text x="0" y="-30" text-anchor="middle" font-family="'Outfit', system-ui, sans-serif" font-size="80" font-weight="900" fill="#fff">?</text>
      <text x="0" y="80" text-anchor="middle" font-family="'Outfit', system-ui, sans-serif" font-size="22" font-weight="800" fill="#fff" letter-spacing="2">SỰ THẬT</text>
    </g>
    <g>
      <rect x="-100" y="-155" width="200" height="310" rx="20" fill="url(#cardD)" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
      <text x="0" y="-30" text-anchor="middle" font-family="'Outfit', system-ui, sans-serif" font-size="90" font-weight="900" fill="#fff">!</text>
      <text x="0" y="80" text-anchor="middle" font-family="'Outfit', system-ui, sans-serif" font-size="24" font-weight="800" fill="#fff" letter-spacing="2">THỬ THÁCH</text>
    </g>
    <g transform="rotate(18) translate(140 -10)">
      <rect x="-100" y="-145" width="200" height="290" rx="20" fill="url(#cardN)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
      <text x="0" y="-30" text-anchor="middle" font-family="'Outfit', system-ui, sans-serif" font-size="80" font-weight="900" fill="#fff">~</text>
      <text x="0" y="80" text-anchor="middle" font-family="'Outfit', system-ui, sans-serif" font-size="22" font-weight="800" fill="#fff" letter-spacing="2">CHƯA TỪNG</text>
    </g>
  </g>
</svg>
